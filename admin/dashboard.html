<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявки — Админка Goat Speckle</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="../images/favicon-256.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="admin-common.js"></script>
</head>
<body>

<header class="admin-header">
  <div class="logo" style="margin: 0;">
    <img src="../images/logo-nav.jpg" alt="Goat Speckle">
    Админка Goat Speckle
  </div>
  <div style="display:flex; align-items:center; gap: 16px;">
    <span class="admin-user" id="user-email"></span>
    <button class="btn btn-outline" id="logout-btn" style="min-height: 40px; padding: 8px 20px;">Выйти</button>
  </div>
</header>

<nav class="admin-tabs" aria-label="Разделы админки">
  <a href="dashboard.html" class="active">Заявки</a>
  <a href="services.html">Услуги и цены</a>
  <a href="news.html">Новости</a>
  <a href="reviews.html">Отзывы</a>
  <a href="gallery.html">Галерея</a>
</nav>

<main id="main-content">
  <div class="container" style="padding-top: 30px; padding-bottom: 60px;">

    <div class="stat-cards">
      <div class="stat-card">
        <div class="num" id="stat-total">—</div>
        <div class="label">Всего заявок</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-new">—</div>
        <div class="label">Новые</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-progress">—</div>
        <div class="label">В работе</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-done">—</div>
        <div class="label">Выполнено</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="new">Новые</button>
      <button class="filter-btn" data-filter="in_progress">В работе</button>
      <button class="filter-btn" data-filter="done">Выполнено</button>
      <button class="filter-btn" data-filter="cancelled">Отменено</button>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table" id="bookings-table">
        <thead>
          <tr>
            <th>Дата</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Комментарий</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="bookings-body">
        </tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">Заявок пока нет</div>
    </div>

  </div>
</main>

<script>
  let allBookings = [];
  let currentFilter = "all";

  async function loadBookings() {
    document.getElementById("bookings-body").innerHTML =
      `<tr><td colspan="5">Загрузка…</td></tr>`;

    let result;
    try {
      result = await withTimeout(
        supabaseClient.from("bookings").select("*").order("created_at", { ascending: false }),
        10000,
        "заявки"
      );
    } catch (err) {
      document.getElementById("bookings-body").innerHTML =
        `<tr><td colspan="5">Ошибка загрузки: ${escapeHtml(err.message)}</td></tr>`;
      return;
    }

    const { data, error } = result;

    if (error) {
      document.getElementById("bookings-body").innerHTML =
        `<tr><td colspan="5">Ошибка загрузки: ${escapeHtml(error.message)}</td></tr>`;
      return;
    }

    allBookings = data || [];
    updateStats();
    renderTable();
  }

  function updateStats() {
    document.getElementById("stat-total").textContent = allBookings.length;
    document.getElementById("stat-new").textContent = allBookings.filter(b => b.status === "new").length;
    document.getElementById("stat-progress").textContent = allBookings.filter(b => b.status === "in_progress").length;
    document.getElementById("stat-done").textContent = allBookings.filter(b => b.status === "done").length;
  }

  function renderTable() {
    const tbody = document.getElementById("bookings-body");
    const emptyState = document.getElementById("empty-state");
    const filtered = currentFilter === "all"
      ? allBookings
      : allBookings.filter(b => b.status === currentFilter);

    if (filtered.length === 0) {
      tbody.innerHTML = "";
      emptyState.style.display = "block";
      return;
    }
    emptyState.style.display = "none";

    tbody.innerHTML = filtered.map(b => `
      <tr>
        <td>${formatDateTime(b.created_at)}</td>
        <td><strong>${escapeHtml(b.name)}</strong></td>
        <td><a href="tel:${escapeHtml(b.phone)}">${escapeHtml(b.phone)}</a></td>
        <td>${escapeHtml(b.message || "—")}</td>
        <td>
          <select class="status-select" data-id="${b.id}" aria-label="Статус заявки">
            <option value="new" ${b.status === "new" ? "selected" : ""}>Новая</option>
            <option value="in_progress" ${b.status === "in_progress" ? "selected" : ""}>В работе</option>
            <option value="done" ${b.status === "done" ? "selected" : ""}>Выполнено</option>
            <option value="cancelled" ${b.status === "cancelled" ? "selected" : ""}>Отменено</option>
          </select>
        </td>
      </tr>
    `).join("");

    document.querySelectorAll(".status-select").forEach(select => {
      select.addEventListener("change", async (e) => {
        const id = e.target.dataset.id;
        const newStatus = e.target.value;
        const { error } = await supabaseClient
          .from("bookings")
          .update({ status: newStatus })
          .eq("id", id);

        if (error) {
          alert("Не удалось обновить статус: " + error.message);
          return;
        }

        const booking = allBookings.find(b => b.id === id);
        if (booking) booking.status = newStatus;
        updateStats();
      });
    });
  }

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      renderTable();
    });
  });

  setupLogout();

  (async () => {
    const session = await requireAuth();
    if (!session) return;
    await loadBookings();

    // Живое обновление списка при новых заявках
    supabaseClient
      .channel("bookings-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "bookings" }, () => {
        loadBookings();
      })
      .subscribe();
  })();
</script>

</body>
</html>
