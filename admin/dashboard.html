<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявки — Админка Goat Speckle</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="../images/favicon-256.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<style>
  .admin-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    padding: 20px;
    background: var(--color-surface);
    border-bottom: 3px dotted var(--color-ink);
  }

  .admin-user {
    font-size: 0.9rem;
    color: var(--color-muted);
  }

  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .filter-btn {
    padding: 10px 18px;
    min-height: 44px;
    border-radius: 999px;
    border: 2px solid var(--color-ink);
    background: var(--color-surface);
    font-weight: 700;
    cursor: pointer;
    transition: background-color var(--duration-base) var(--ease-out), color var(--duration-base) var(--ease-out);
  }

  .filter-btn.active {
    background: var(--color-ink);
    color: #fff;
  }

  .bookings-table-wrap {
    overflow-x: auto;
    border: 3px solid var(--color-ink);
    border-radius: var(--radius);
    background: var(--color-surface);
  }

  table.bookings-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 720px;
  }

  .bookings-table th,
  .bookings-table td {
    padding: 14px 18px;
    text-align: left;
    border-bottom: 1px solid var(--color-border);
    vertical-align: top;
  }

  .bookings-table th {
    background: var(--color-ink);
    color: #fff;
    position: sticky;
    top: 0;
  }

  .bookings-table tr:last-child td {
    border-bottom: none;
  }

  .status-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 800;
  }

  .status-new { background: #fee2e2; color: #991b1b; }
  .status-in_progress { background: #fef3c7; color: #92400e; }
  .status-done { background: #dcfce7; color: #166534; }
  .status-cancelled { background: #e5e7eb; color: #4b5563; }

  .status-select {
    padding: 6px 10px;
    border-radius: 8px;
    border: 2px solid var(--color-ink);
    font-weight: 700;
    font-size: 0.85rem;
    background: var(--color-background);
    min-height: 36px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--color-muted);
  }

  .stat-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 30px;
  }

  @media (max-width: 700px) {
    .stat-cards {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  .stat-card {
    background: var(--color-surface);
    border: 3px solid var(--color-ink);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    text-align: center;
  }

  .stat-card .num {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--color-foreground);
  }

  .stat-card .label {
    font-size: 0.85rem;
    color: var(--color-muted);
  }
</style>
</head>
<body>

<header class="admin-header">
  <div class="logo" style="margin: 0;">
    <img src="../images/logo-nav.jpg" alt="Goat Speckle">
    Админка · Заявки
  </div>
  <div style="display:flex; align-items:center; gap: 16px;">
    <span class="admin-user" id="user-email"></span>
    <button class="btn btn-outline" id="logout-btn" style="min-height: 40px; padding: 8px 20px;">Выйти</button>
  </div>
</header>

<main id="main-content">
  <div class="container" style="padding-top: 30px; padding-bottom: 60px;">

    <div class="stat-cards">
      <div class="stat-card">
        <div class="num" id="stat-total">—</div>
        <div class="label">Всего заявок</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-new">—</div>
        <div class="label">Новые</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-progress">—</div>
        <div class="label">В работе</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-done">—</div>
        <div class="label">Выполнено</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="new">Новые</button>
      <button class="filter-btn" data-filter="in_progress">В работе</button>
      <button class="filter-btn" data-filter="done">Выполнено</button>
      <button class="filter-btn" data-filter="cancelled">Отменено</button>
    </div>

    <div class="bookings-table-wrap">
      <table class="bookings-table" id="bookings-table">
        <thead>
          <tr>
            <th>Дата</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Комментарий</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="bookings-body">
        </tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">Заявок пока нет</div>
    </div>

  </div>
</main>

<script>
  let allBookings = [];
  let currentFilter = "all";

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
  }

  const statusLabels = {
    new: "Новая",
    in_progress: "В работе",
    done: "Выполнено",
    cancelled: "Отменено",
  };

  async function checkAuth() {
    const { data } = await supabaseClient.auth.getSession();
    if (!data.session) {
      window.location.href = "login.html";
      return null;
    }
    return data.session;
  }

  async function loadBookings() {
    const { data, error } = await supabaseClient
      .from("bookings")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      document.getElementById("bookings-body").innerHTML =
        `<tr><td colspan="5">Ошибка загрузки: ${error.message}</td></tr>`;
      return;
    }

    allBookings = data || [];
    updateStats();
    renderTable();
  }

  function updateStats() {
    document.getElementById("stat-total").textContent = allBookings.length;
    document.getElementById("stat-new").textContent = allBookings.filter(b => b.status === "new").length;
    document.getElementById("stat-progress").textContent = allBookings.filter(b => b.status === "in_progress").length;
    document.getElementById("stat-done").textContent = allBookings.filter(b => b.status === "done").length;
  }

  function renderTable() {
    const tbody = document.getElementById("bookings-body");
    const emptyState = document.getElementById("empty-state");
    const filtered = currentFilter === "all"
      ? allBookings
      : allBookings.filter(b => b.status === currentFilter);

    if (filtered.length === 0) {
      tbody.innerHTML = "";
      emptyState.style.display = "block";
      return;
    }
    emptyState.style.display = "none";

    tbody.innerHTML = filtered.map(b => `
      <tr>
        <td>${formatDate(b.created_at)}</td>
        <td><strong>${escapeHtml(b.name)}</strong></td>
        <td><a href="tel:${escapeHtml(b.phone)}">${escapeHtml(b.phone)}</a></td>
        <td>${escapeHtml(b.message || "—")}</td>
        <td>
          <select class="status-select" data-id="${b.id}" aria-label="Статус заявки">
            <option value="new" ${b.status === "new" ? "selected" : ""}>Новая</option>
            <option value="in_progress" ${b.status === "in_progress" ? "selected" : ""}>В работе</option>
            <option value="done" ${b.status === "done" ? "selected" : ""}>Выполнено</option>
            <option value="cancelled" ${b.status === "cancelled" ? "selected" : ""}>Отменено</option>
          </select>
        </td>
      </tr>
    `).join("");

    document.querySelectorAll(".status-select").forEach(select => {
      select.addEventListener("change", async (e) => {
        const id = e.target.dataset.id;
        const newStatus = e.target.value;
        const { error } = await supabaseClient
          .from("bookings")
          .update({ status: newStatus })
          .eq("id", id);

        if (error) {
          alert("Не удалось обновить статус: " + error.message);
          return;
        }

        const booking = allBookings.find(b => b.id === id);
        if (booking) booking.status = newStatus;
        updateStats();
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      renderTable();
    });
  });

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
  });

  (async () => {
    const session = await checkAuth();
    if (!session) return;
    document.getElementById("user-email").textContent = session.user.email;
    await loadBookings();

    // Живое обновление списка при новых заявках
    supabaseClient
      .channel("bookings-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "bookings" }, () => {
        loadBookings();
      })
      .subscribe();
  })();
</script>

</body>
</html>
