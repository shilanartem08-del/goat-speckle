<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новости — Админка Goat Speckle</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="../images/favicon-256.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="admin-common.js"></script>
</head>
<body>

<header class="admin-header">
  <div class="logo" style="margin: 0;">
    <img src="../images/logo-nav.jpg" alt="Goat Speckle">
    Админка Goat Speckle
  </div>
  <div style="display:flex; align-items:center; gap: 16px;">
    <span class="admin-user" id="user-email"></span>
    <button class="btn btn-outline" id="logout-btn" style="min-height: 40px; padding: 8px 20px;">Выйти</button>
  </div>
</header>

<nav class="admin-tabs" aria-label="Разделы админки">
  <a href="dashboard.html">Заявки</a>
  <a href="services.html">Услуги и цены</a>
  <a href="news.html" class="active">Новости</a>
</nav>

<main id="main-content">
  <div class="container" style="padding-top: 30px; padding-bottom: 60px;">

    <div class="admin-toolbar">
      <h2>Новости студии</h2>
      <button class="btn btn-primary" id="add-btn" style="min-height: 44px; padding: 10px 22px;">+ Добавить новость</button>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table" id="news-table">
        <thead>
          <tr>
            <th>Дата</th>
            <th>Заголовок</th>
            <th>Статус</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="news-body"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">Пока нет ни одной новости — добавьте первую.</div>
    </div>

  </div>
</main>

<!-- Модальное окно добавления/редактирования новости -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-title">Добавить новость</h3>
    <form id="news-form" novalidate>
      <input type="hidden" id="news-id">

      <label for="news-date">Дата публикации</label>
      <input type="date" id="news-date" required aria-required="true">

      <label for="news-title">Заголовок</label>
      <input type="text" id="news-title" placeholder="Скидка 15% на первый визит" required aria-required="true">

      <label for="news-body">Текст новости</label>
      <textarea id="news-body" placeholder="Подробное описание новости или акции" required aria-required="true"></textarea>

      <label for="news-link-url">Ссылка «Подробнее» (необязательно)</label>
      <p class="field-hint">Например, ссылка на Telegram-канал. Если оставить пустым, ссылка будет вести в никуда (#)</p>
      <input type="url" id="news-link-url" placeholder="https://t.me/...">

      <label for="news-link-label">Текст ссылки</label>
      <input type="text" id="news-link-label" placeholder="Подробнее" value="Подробнее">

      <label style="display:flex; align-items:center; gap:10px; margin-top:16px; font-weight:700;">
        <input type="checkbox" id="news-visible" checked style="width:20px; height:20px;">
        Показывать на сайте
      </label>

      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancel-btn">Отмена</button>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </div>
      <p class="form-status" id="form-status" role="alert"></p>
    </form>
  </div>
</div>

<script>
  let allNews = [];
  let editingId = null;

  async function loadNews() {
    document.getElementById("news-body").innerHTML =
      `<tr><td colspan="4">Загрузка…</td></tr>`;

    let result;
    try {
      result = await withTimeout(
        supabaseClient.from("news").select("*").order("published_at", { ascending: false }),
        10000,
        "новости"
      );
    } catch (err) {
      document.getElementById("news-body").innerHTML =
        `<tr><td colspan="4">Ошибка загрузки: ${escapeHtml(err.message)}</td></tr>`;
      return;
    }

    const { data, error } = result;

    if (error) {
      document.getElementById("news-body").innerHTML =
        `<tr><td colspan="4">Ошибка загрузки: ${escapeHtml(error.message)}</td></tr>`;
      return;
    }

    allNews = data || [];
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById("news-body");
    const emptyState = document.getElementById("empty-state");

    if (allNews.length === 0) {
      tbody.innerHTML = "";
      emptyState.style.display = "block";
      return;
    }
    emptyState.style.display = "none";

    tbody.innerHTML = allNews.map(n => `
      <tr>
        <td>${formatDateOnly(n.published_at)}</td>
        <td><strong>${escapeHtml(n.title)}</strong></td>
        <td><span class="status-badge status-${n.is_visible ? "published" : "hidden"}">${n.is_visible ? "Опубликовано" : "Скрыто"}</span></td>
        <td>
          <div class="row-actions">
            <button class="icon-btn" data-action="edit" data-id="${n.id}" aria-label="Редактировать">
              <svg class="icon-svg" viewBox="0 0 24 24"><path d="M4 20h4l11-11-4-4L4 16v4Z"/><path d="M13.5 6.5l4 4"/></svg>
            </button>
            <button class="icon-btn danger" data-action="delete" data-id="${n.id}" aria-label="Удалить">
              <svg class="icon-svg" viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>
            </button>
          </div>
        </td>
      </tr>
    `).join("");

    document.querySelectorAll('[data-action="edit"]').forEach(btn => {
      btn.addEventListener("click", () => openEditModal(btn.dataset.id));
    });
    document.querySelectorAll('[data-action="delete"]').forEach(btn => {
      btn.addEventListener("click", () => deleteNews(btn.dataset.id));
    });
  }

  function todayIso() {
    const d = new Date();
    return d.toISOString().slice(0, 10);
  }

  function openAddModal() {
    editingId = null;
    document.getElementById("modal-title").textContent = "Добавить новость";
    document.getElementById("news-form").reset();
    document.getElementById("news-date").value = todayIso();
    document.getElementById("news-link-label").value = "Подробнее";
    document.getElementById("news-visible").checked = true;
    document.getElementById("modal-overlay").classList.add("open");
  }

  function openEditModal(id) {
    const n = allNews.find(x => x.id === id);
    if (!n) return;
    editingId = id;
    document.getElementById("modal-title").textContent = "Редактировать новость";
    document.getElementById("news-date").value = n.published_at;
    document.getElementById("news-title").value = n.title;
    document.getElementById("news-body").value = n.body;
    document.getElementById("news-link-url").value = n.link_url || "";
    document.getElementById("news-link-label").value = n.link_label || "Подробнее";
    document.getElementById("news-visible").checked = n.is_visible;
    document.getElementById("modal-overlay").classList.add("open");
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
  }

  async function deleteNews(id) {
    if (!confirm("Удалить эту новость без возможности восстановления?")) return;
    const { error } = await supabaseClient.from("news").delete().eq("id", id);
    if (error) {
      alert("Не удалось удалить: " + error.message);
      return;
    }
    await loadNews();
  }

  document.getElementById("add-btn").addEventListener("click", openAddModal);
  document.getElementById("cancel-btn").addEventListener("click", closeModal);
  document.getElementById("modal-overlay").addEventListener("click", (e) => {
    if (e.target.id === "modal-overlay") closeModal();
  });

  document.getElementById("news-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const payload = {
      published_at: document.getElementById("news-date").value,
      title: document.getElementById("news-title").value.trim(),
      body: document.getElementById("news-body").value.trim(),
      link_url: document.getElementById("news-link-url").value.trim() || null,
      link_label: document.getElementById("news-link-label").value.trim() || "Подробнее",
      is_visible: document.getElementById("news-visible").checked,
    };

    const statusEl = document.getElementById("form-status");

    let error;
    if (editingId) {
      ({ error } = await supabaseClient.from("news").update(payload).eq("id", editingId));
    } else {
      ({ error } = await supabaseClient.from("news").insert([payload]));
    }

    if (error) {
      statusEl.textContent = "Ошибка: " + error.message;
      statusEl.classList.add("visible", "error");
      return;
    }

    closeModal();
    await loadNews();
  });

  setupLogout();

  (async () => {
    const session = await requireAuth();
    if (!session) return;
    await loadNews();
  })();
</script>

</body>
</html>
